<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS reset and variables */
        :root {
            --primary: #635bff;
            --primary-hover: #5851d8;
            --primary-rgb: 99, 91, 255;
            --bg: linear-gradient(135deg, #f6f9fc 0%, #eef0f8 100%);
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
            --input-bg: #fcfcfc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #334155;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-main);
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #94a3b8;
            width: 1.25rem;
            height: 1.25rem;
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .form-control:focus {
            background-color: var(--card-bg);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.15);
        }

        .form-control:focus+.input-icon,
        .form-control:not(:placeholder-shown)+.input-icon {
            color: var(--primary);
        }

        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.2s ease;
            height: 0;
            overflow: hidden;
        }

        .error-message.visible {
            opacity: 1;
            transform: translateY(0);
            height: auto;
            margin-top: 0.5rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(var(--primary-rgb), 0.25);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <h1>Student Portal</h1>
                <p>Sign in to your account</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Institutional Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-control" placeholder="student@fst-sbz.tn" required
                            autocomplete="email">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="error-message" id="emailError">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Please enter a valid @fst-sbz.tn email.</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required
                            autocomplete="current-password">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Sign In
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>

            <div class="footer">
                Having trouble? <a href="#">Contact Support</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const emailError = document.getElementById('emailError');

            const INSTITUTION_DOMAIN = '@fst-sbz.tn';

            const showError = (show) => {
                if (show) {
                    emailError.classList.add('visible');
                    emailInput.style.borderColor = 'var(--error)';
                    emailInput.style.backgroundColor = '#fef2f2';
                } else {
                    emailError.classList.remove('visible');
                    emailInput.style.borderColor = '';
                    emailInput.style.backgroundColor = '';
                }
            };

            emailInput.addEventListener('input', () => {
                // Clear error dynamically while typing if they manage to fix it
                if (emailError.classList.contains('visible')) {
                    const email = emailInput.value.trim();
                    if (email.endsWith(INSTITUTION_DOMAIN)) {
                        showError(false);
                    }
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const email = emailInput.value.trim();
                const password = document.getElementById('password').value;

                // Validate email domain check
                if (!email || !email.endsWith(INSTITUTION_DOMAIN)) {
                    showError(true);

                    // Add shake animation
                    emailInput.style.animation = 'none';
                    emailInput.offsetHeight; /* trigger browser reflow */
                    emailInput.style.animation = 'shake 0.4s ease-in-out';
                    return;
                }

                form.reportValidity();
                if (!form.checkValidity()) return;

                showError(false);

                // Show loading state on button
                const btn = form.querySelector('.btn-submit');
                const originalContent = btn.innerHTML;

                btn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation: spin 1s linear infinite;">
                        <circle opacity="0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path opacity="0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Signing in...
                `;
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.9';

                // Simulate API call and redirect
                setTimeout(() => {
                    console.log("JWT token generated");
                    window.location.href = "../dashboard/dashboard.html";
                }, 1500);
            });
        });
    </script>
</body>

</html>
