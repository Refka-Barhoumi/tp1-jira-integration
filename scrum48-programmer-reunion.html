<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SCRUM-48 - Programmer Réunion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 40px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .form-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #11998e; font-size: 28px; margin-bottom: 10px; }
        .badge { display: inline-block; padding: 6px 15px; margin: 5px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .scrum { background: #11998e; color: white; }
        .competence { background: #36B37E; color: white; }
        .livrable { background: #FF5630; color: white; }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: #333; font-weight: 600; font-size: 15px; }
        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
        }
        .datetime-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .mode-options {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .mode-option {
            flex: 1;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-option:hover { border-color: #11998e; }
        .mode-option.selected {
            border-color: #11998e;
            background: #f0fff4;
        }
        .mode-option .icon { font-size: 32px; margin-bottom: 10px; }
        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .footer { text-align: center; margin-top: 30px; color: rgba(255,255,255,0.9); font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="header">
                <h1>📅 Programmer une Réunion</h1>
                <p>Planifier un entretien avec l'étudiant</p>
                <div style="margin-top: 15px;">
                    <span class="badge scrum">SCRUM-48</span>
                    <span class="badge competence">#competence-SI7</span>
                    <span class="badge livrable">@livrable-code</span>
                </div>
            </div>
            
            <form>
                <div class="form-group">
                    <label>Projet concerné</label>
                    <select>
                        <option>Système PFE IA - Ahmed Ben Ali, Maysa Trabelsi</option>
                        <option>App Médicale - Karim Louati</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Date et heure</label>
                    <div class="datetime-row">
                        <input type="date" required>
                        <input type="time" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Mode de réunion</label>
                    <div class="mode-options">
                        <div class="mode-option selected">
                            <div class="icon">🏢</div>
                            <div>Présentiel</div>
                        </div>
                        <div class="mode-option">
                            <div class="icon">💻</div>
                            <div>Distantiel</div>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Lieu / Lien visioconférence</label>
                    <input type="text" placeholder="Bureau 302 ou lien Zoom/Teams...">
                </div>
                
                <div class="form-group">
                    <label>Ordre du jour</label>
                    <textarea rows="4" placeholder="Points à aborder pendant la réunion..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">📨 Programmer la réunion</button
